<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket Whale Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151922;
      --border: #252a36;
      --text: #e6e9f0;
      --text-muted: #8b92a6;
      --accent: #00d4aa;
      --accent-dim: #00a884;
      --positive: #22c55e;
      --negative: #ef4444;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
    }
    .layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 span.emoji { font-size: 1.4rem; }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { opacity: 0.9; }
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      min-width: 140px;
    }
    .stat-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .stat-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th {
      text-align: left;
      padding: 14px 16px;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr.row-clickable { cursor: pointer; }
    tr.row-clickable:hover { background: rgba(0,212,170,0.06); }
    .wallet-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .wallet-cell .alias {
      color: var(--accent);
      font-weight: 600;
      margin-right: 8px;
    }
    .num-positive { color: var(--positive); }
    .num-negative { color: var(--negative); }
    .loading, .error {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .error { color: var(--negative); }
    .breadcrumb {
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .breadcrumb a { color: var(--accent); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .wallet-page .wallet-addr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      word-break: break-all;
      margin-bottom: 20px;
      color: var(--text);
    }
    .wallet-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .wallet-stats .stat-card { min-width: 0; }
    .positions-list { margin-top: 16px; }
    .positions-list h4 {
      margin: 0 0 12px 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .position-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .position-item .position-left {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .position-item .position-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .position-item .position-icon-placeholder {
      background: var(--border);
    }
    .position-item .position-body { min-width: 0; }
    .position-item .title {
      font-weight: 600;
      margin: 0 0 8px 0;
      font-size: 14px;
      line-height: 1.3;
      color: var(--text);
    }
    .position-item .position-details {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .position-item .position-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(139, 146, 166, 0.25);
      color: var(--text);
    }
    .position-item .position-shares {
      font-size: 12px;
      color: var(--text-muted);
    }
    .position-item .position-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .position-item .position-value-block {
      text-align: right;
    }
    .position-item .position-total-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: block;
    }
    .position-item .position-pnl-line {
      font-size: 12px;
      margin-top: 2px;
    }
    .position-item .position-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }
    .position-item .position-link:hover { color: var(--accent); background: rgba(0,212,170,0.1); }
    .position-item .position-link svg { width: 18px; height: 18px; }
    .text-muted { color: var(--text-muted); }
    .view { display: none; }
    .view.active { display: block; }
    .pagination {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .pagination .page-info { font-family: 'JetBrains Mono', monospace; }
    .pagination .nav {
      display: flex;
      gap: 8px;
    }
    .pagination .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .scroll-to-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: opacity 0.2s, visibility 0.2s, transform 0.2s;
      z-index: 50;
    }
    .scroll-to-top.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .scroll-to-top:hover { opacity: 0.95; }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <h1><span class="emoji">🐋</span> Polymarket Whale Tracker</h1>
      <div class="controls">
        <button class="btn btn-ghost" id="refreshBtn">Refresh</button>
      </div>
    </header>

    <!-- Leaderboard view -->
    <div id="listView" class="view active">
      <div class="stats-bar" id="statsBar" style="display: none;">
        <div class="stat-card">
          <div class="label">Wallets</div>
          <div class="value" id="statWallets">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Total PnL (top)</div>
          <div class="value" id="statPnl">$0</div>
        </div>
      </div>
      <div class="table-wrap">
        <div id="tableLoading" class="loading">Loading leaderboard…</div>
        <div id="tableError" class="error" style="display: none;"></div>
        <table id="leaderboardTable" style="display: none;">
          <thead>
            <tr>
              <th>#</th>
              <th>Wallet</th>
              <th>Total PnL</th>
              <th>ROI</th>
              <th>Positions</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Wallet detail view: addr/{address} -->
    <div id="walletView" class="view wallet-page">
      <div class="breadcrumb" id="breadcrumb"><a href="/dashboard/">← Leaderboard</a></div>
      <div class="wallet-addr" id="walletAddr">0x…</div>
      <div class="wallet-stats" id="walletStats"></div>
      <div class="positions-list">
        <h4>Positions <span id="positionsRange" class="text-muted"></span></h4>
        <div id="walletPositionsLoading" class="loading">Loading…</div>
        <div id="walletPositionsError" class="error" style="display: none;"></div>
        <div id="walletPositions"></div>
        <div id="walletPositionsPagination" class="pagination" style="display: none;"></div>
      </div>
    </div>
  </div>

  <button type="button" class="scroll-to-top" id="scrollToTopBtn" title="Back to top" aria-label="Back to top">↑</button>

  <script>
    const API = '';
    const $ = (id) => document.getElementById(id);
    const ADDR_PATH_PREFIX = '/dashboard/addr/';
    const POSITIONS_PER_PAGE = 20;

    function getWalletAddressFromPath() {
      const path = window.location.pathname;
      if (!path.startsWith(ADDR_PATH_PREFIX)) return null;
      const addr = path.slice(ADDR_PATH_PREFIX.length);
      if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) return null;
      return addr;
    }

    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const el = $(viewId);
      if (el) el.classList.add('active');
    }

    function shortAddr(addr) {
      if (!addr || addr.length < 12) return addr;
      return addr.slice(0, 6) + '…' + addr.slice(-4);
    }

    function escapeHtml(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function fmtMoney(n) {
      const x = Number(n ?? 0);
      const abs = Math.abs(x);
      const sign = x < 0 ? '-' : '';
      if (abs >= 1e6) return sign + '$' + (abs / 1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return sign + '$' + (abs / 1e3).toFixed(1) + 'k';
      return sign + '$' + abs.toFixed(0);
    }

    function fmtPct(n) {
      const s = (n >= 0 ? '+' : '') + (n ?? 0).toFixed(1) + '%';
      return s;
    }

    async function loadLeaderboard(refresh = false) {
      const loading = $('tableLoading');
      const error = $('tableError');
      const table = $('leaderboardTable');
      const body = $('leaderboardBody');
      const statsBar = $('statsBar');
      loading.style.display = 'block';
      error.style.display = 'none';
      table.style.display = 'none';

      try {
        const res = await fetch(API + '/api/leaderboard' + (refresh ? '?refresh=true' : ''));
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const data = await res.json();
        const list = data.leaderboard || [];

        body.innerHTML = list.map((e, i) => {
          const pnlClass = e.totalPnl >= 0 ? 'num-positive' : 'num-negative';
          const roiClass = e.roi >= 0 ? 'num-positive' : 'num-negative';
          return `<tr class="row-clickable" data-address="${e.wallet}">
            <td>${i + 1}</td>
            <td class="wallet-cell">${e.alias ? `<span class="alias">${e.alias}</span>` : ''}${shortAddr(e.wallet)}</td>
            <td class="${pnlClass}">${fmtMoney(e.totalPnl)}</td>
            <td class="${roiClass}">${fmtPct(e.roi)}</td>
            <td>${e.positionsCount ?? 0}</td>
            <td>${fmtMoney(e.totalValue)}</td>
          </tr>`;
        }).join('');

        $('statWallets').textContent = list.length;
        $('statPnl').textContent = list.length ? fmtMoney(list[0].totalPnl) : '$0';
        $('statPnl').className = 'value ' + (list.length && list[0].totalPnl >= 0 ? 'num-positive' : 'num-negative');
        statsBar.style.display = 'flex';
        table.style.display = 'table';
        loading.style.display = 'none';

        body.querySelectorAll('tr.row-clickable').forEach(row => {
          row.addEventListener('click', () => {
            window.location.href = '/dashboard/addr/' + encodeURIComponent(row.dataset.address);
          });
        });
      } catch (err) {
        loading.style.display = 'none';
        error.style.display = 'block';
        error.textContent = 'Failed to load: ' + err.message;
      }
    }

    function getPageFromQuery() {
      const p = new URLSearchParams(window.location.search).get('page');
      const n = parseInt(p, 10);
      return (n >= 1 && !isNaN(n)) ? n : 1;
    }

    function renderWalletPositionsPage(positions, page) {
      const total = positions.length;
      const totalPages = Math.max(1, Math.ceil(total / POSITIONS_PER_PAGE));
      const cur = Math.min(page, totalPages);
      const start = (cur - 1) * POSITIONS_PER_PAGE;
      const slice = positions.slice(start, start + POSITIONS_PER_PAGE);

      $('positionsRange').textContent = total === 0 ? '' : `(${start + 1}–${start + slice.length} of ${total})`;

      $('walletPositions').innerHTML = slice.length === 0
        ? '<p class="text-muted">No open positions.</p>'
        : slice.map(p => {
            const pnlClass = (p.cashPnl ?? 0) >= 0 ? 'num-positive' : 'num-negative';
            const title = (p.title || p.slug || 'Market');
            const titleStr = title.length > 80 ? title.slice(0, 80) + '…' : title;
            const iconHtml = p.icon ? `<img class="position-icon" src="${escapeHtml(p.icon)}" alt="" />` : '<div class="position-icon position-icon-placeholder"></div>';
            const curPriceCents = (p.curPrice != null) ? Math.round((p.curPrice || 0) * 100) : '';
            const pillText = p.outcome ? (curPriceCents !== '' ? `${escapeHtml(p.outcome)} ${curPriceCents}¢` : escapeHtml(p.outcome)) : '';
            const sharesStr = (p.size != null && p.size > 0) ? (p.size >= 1000 ? (p.size / 1000).toFixed(1) + 'k' : p.size.toFixed(1)) + ' shares' : '';
            const totalValue = (p.currentValue != null) ? p.currentValue : (p.initialValue != null) ? p.initialValue : 0;
            const pctStr = (p.percentPnl != null) ? ` (${(p.percentPnl >= 0 ? '+' : '') + (p.percentPnl).toFixed(2)}%)` : '';
            const marketUrl = (p.eventSlug) ? 'https://polymarket.com/event/' + escapeHtml(p.eventSlug) : '#';
            const linkIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
            return `<div class="position-item">
              <div class="position-left">
                ${iconHtml}
                <div class="position-body">
                  <div class="title">${escapeHtml(titleStr)}</div>
                  <div class="position-details">
                    ${pillText ? `<span class="position-pill">${pillText}</span>` : ''}
                    ${sharesStr ? `<span class="position-shares">${escapeHtml(sharesStr)}</span>` : ''}
                  </div>
                </div>
              </div>
              <div class="position-right">
                <div class="position-value-block">
                  <span class="position-total-value">${fmtMoney(totalValue)}</span>
                  <span class="position-pnl-line ${pnlClass}">${fmtMoney(p.cashPnl)}${pctStr}</span>
                </div>
                <a class="position-link" href="${marketUrl}" target="_blank" rel="noopener" title="View on Polymarket">${linkIcon}</a>
              </div>
            </div>`;
          }).join('');

      const pagination = $('walletPositionsPagination');
      if (totalPages <= 1) {
        pagination.style.display = 'none';
        return;
      }
      pagination.style.display = 'flex';
      pagination.innerHTML = `
        <span class="page-info">Page ${cur} of ${totalPages}</span>
        <div class="nav">
          <button class="btn btn-ghost" id="walletPagePrev" ${cur <= 1 ? 'disabled' : ''}>← Prev</button>
          <button class="btn btn-ghost" id="walletPageNext" ${cur >= totalPages ? 'disabled' : ''}>Next →</button>
        </div>
      `;
      $('walletPagePrev').addEventListener('click', () => {
        if (cur > 1) window.location.search = '?page=' + (cur - 1);
      });
      $('walletPageNext').addEventListener('click', () => {
        if (cur < totalPages) window.location.search = '?page=' + (cur + 1);
      });
    }

    async function loadWalletPage(address) {
      $('walletAddr').textContent = address;
      $('walletStats').innerHTML = '';
      $('walletPositionsLoading').style.display = 'block';
      $('walletPositionsError').style.display = 'none';
      $('walletPositions').innerHTML = '';
      $('walletPositionsPagination').style.display = 'none';
      $('positionsRange').textContent = '';

      try {
        const res = await fetch(API + '/api/wallet/' + encodeURIComponent(address));
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const w = await res.json();

        $('walletStats').innerHTML = `
          <div class="stat-card"><div class="label">Total value</div><div class="value">${fmtMoney(w.totalValue)}</div></div>
          <div class="stat-card"><div class="label">Total PnL</div><div class="value num-${w.totalPnl >= 0 ? 'positive' : 'negative'}">${fmtMoney(w.totalPnl)}</div></div>
          <div class="stat-card"><div class="label">ROI</div><div class="value num-${w.roi >= 0 ? 'positive' : 'negative'}">${fmtPct(w.roi)}</div></div>
          <div class="stat-card"><div class="label">Positions</div><div class="value">${w.positionsCount ?? 0}</div></div>
        `;

        const positions = w.positions || [];
        $('walletPositionsLoading').style.display = 'none';
        const page = getPageFromQuery();
        renderWalletPositionsPage(positions, page);
        document.title = shortAddr(address) + ' — Whale Tracker';
      } catch (err) {
        $('walletPositionsLoading').style.display = 'none';
        $('walletPositionsError').style.display = 'block';
        $('walletPositionsError').textContent = 'Failed to load: ' + err.message;
      }
    }

    $('refreshBtn').addEventListener('click', () => {
      const addr = getWalletAddressFromPath();
      if (addr) loadWalletPage(addr);
      else loadLeaderboard(true);
    });

    (function init() {
      const addr = getWalletAddressFromPath();
      if (addr) {
        showView('walletView');
        loadWalletPage(addr);
      } else {
        showView('listView');
        loadLeaderboard();
      }
    })();

    // Scroll-to-top button
    const scrollToTopBtn = $('scrollToTopBtn');
    function toggleScrollToTop() {
      if (window.scrollY > 200) scrollToTopBtn.classList.add('visible');
      else scrollToTopBtn.classList.remove('visible');
    }
    window.addEventListener('scroll', toggleScrollToTop, { passive: true });
    scrollToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
